// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        kotlinVersion = '2.0.20'
        agpVersion = '8.4.0'
        androidPackageName = 'com.anonymous.mobileapp'
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:$agpVersion")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        // DO NOT add expo-modules-autolinking here – it's provided by Expo
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
    // Set the package name for all subprojects (helps autolinking)
    project.ext {
        packageName = rootProject.ext.androidPackageName
    }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
