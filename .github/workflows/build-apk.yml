name: Build Android APK (Gradle)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies (root)
        run: npm install --legacy-peer-deps

      - name: Install dependencies (mobile-app)
        run: npm install --legacy-peer-deps
        working-directory: ./mobile-app

      - name: Build APK with Gradle
        run: |
          cd mobile-app/android
          chmod +x gradlew
          ./gradlew assembleRelease -DEXPO_USE_COMMUNITY_AUTOLINKING=1
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile-app/android/app/build/outputs/apk/release/app-release-unsigned.apk